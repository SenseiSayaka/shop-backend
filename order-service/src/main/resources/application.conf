ktor {
  deployment {
    port = 8083
    port = ${?PORT}
  }
  application {
    modules = [com.shop.order.ApplicationKt.module]
  }
}

db {
  url = "jdbc:postgresql://localhost:5432/shopdb"
  url = ${?DATABASE_URL}
  user = "postgres"
  user = ${?DB_USER}
  password = "postgres"
  password = ${?DB_PASSWORD}
}

jwt {
  secret = "your-super-secret-key-change-in-production"
  secret = ${?JWT_SECRET}
  issuer = "shop-auth"
  audience = "shop-users"
}

redis {
  url = "redis://localhost:6379"
  url = ${?REDIS_URL}
}

rabbitmq {
  host = "localhost"
  host = ${?RABBITMQ_HOST}
  port = "5672"
  port = ${?RABBITMQ_PORT}
  user = "guest"
  user = ${?RABBITMQ_USER}
  password = "guest"
  password = ${?RABBITMQ_PASSWORD}
}

product {
  service {
    url = "http://localhost:8082"
    url = ${?PRODUCT_SERVICE_URL}
  }
}
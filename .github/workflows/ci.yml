name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: |
          chmod +x auth-service/gradlew
          chmod +x product-service/gradlew
          chmod +x order-service/gradlew
          chmod +x notification-worker/gradlew

      # ── Unit тесты (только mockk, без Docker) ──
      - name: Run unit tests - auth-service
        working-directory: auth-service
        run: ./gradlew test --tests "com.shop.auth.AuthServiceTest" --no-daemon
        env:
          JWT_SECRET: test-secret-key-at-least-32-characters!!

      - name: Run unit tests - product-service
        working-directory: product-service
        run: ./gradlew test --tests "com.shop.product.ProductServiceTest" --no-daemon

      # ── E2E тесты (TestContainers — поднимает postgres сам) ──
      - name: Run E2E tests - auth-service
        working-directory: auth-service
        run: ./gradlew test --tests "com.shop.auth.AuthRouteE2ETest" --no-daemon
        env:
          JWT_SECRET: test-secret-key-at-least-32-characters!!

      # ── Integration тесты (TestContainers) ──
      - name: Run integration tests - order-service
        working-directory: order-service
        run: ./gradlew test --tests "com.shop.order.OrderIntegrationTest" --no-daemon

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            auth-service/build/reports/tests/
            product-service/build/reports/tests/
            order-service/build/reports/tests/

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: |
          chmod +x auth-service/gradlew
          chmod +x product-service/gradlew
          chmod +x order-service/gradlew
          chmod +x notification-worker/gradlew

      - name: Build all JARs
        run: |
          cd auth-service && ./gradlew shadowJar --no-daemon
          cd ../product-service && ./gradlew shadowJar --no-daemon
          cd ../order-service && ./gradlew shadowJar --no-daemon
          cd ../notification-worker && ./gradlew shadowJar --no-daemon

      - name: Build Docker images
        run: docker compose build

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag shop-backend-auth-service \
            ${{ secrets.DOCKER_USERNAME }}/shop-auth:latest
          docker tag shop-backend-product-service \
            ${{ secrets.DOCKER_USERNAME }}/shop-products:latest
          docker tag shop-backend-order-service \
            ${{ secrets.DOCKER_USERNAME }}/shop-orders:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/shop-auth:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/shop-products:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/shop-orders:latest
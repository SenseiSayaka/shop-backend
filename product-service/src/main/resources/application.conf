ktor {
  deployment {
    port = 8082
    port = ${?PORT}
  }
  application {
    modules = [com.shop.product.ApplicationKt.module]
  }
}

db {
  url = "jdbc:postgresql://localhost:5432/shopdb"
  url = ${?DATABASE_URL}
  user = "postgres"
  user = ${?DB_USER}
  password = "postgres"
  password = ${?DB_PASSWORD}
}

jwt {
  secret = "your-super-secret-key-change-in-production"
  secret = ${?JWT_SECRET}
  issuer = "shop-auth"
  audience = "shop-users"
}

redis {
  url = "redis://localhost:6379"
  url = ${?REDIS_URL}
}
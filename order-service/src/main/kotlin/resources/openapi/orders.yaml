openapi: "3.0.0"
info:
  title: Order Service API
  description: Управление заказами и статистика
  version: "1.0.0"
servers:
  - url: http://localhost:8083

security:
  - bearerAuth: []

paths:
  /orders:
    post:
      summary: Создать заказ
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              items:
                - productId: 1
                  quantity: 2
                - productId: 3
                  quantity: 1
      responses:
        '201':
          description: Заказ создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                id: 42
                userId: 7
                status: "pending"
                totalAmount: 2099.97
                items:
                  - productId: 1
                    productName: "iPhone 15"
                    quantity: 2
                    price: 999.99
                  - productId: 3
                    productName: "AirPods"
                    quantity: 1
                    price: 99.99
        '400':
          description: Нет товаров в заказе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Недостаточно товара на складе
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован

    get:
      summary: История заказов текущего пользователя
      tags:
        - Orders
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          description: Не авторизован

  /orders/{id}:
    delete:
      summary: Отменить заказ
      tags:
        - Orders
      parameters:
        - name: id
          in: path
          required: true
          description: ID заказа
          schema:
            type: integer
          example: 42
      responses:
        '204':
          description: Заказ отменён
        '404':
          description: Заказ не найден или уже отменён
        '403':
          description: Нет доступа к чужому заказу
        '401':
          description: Не авторизован

  /stats/orders:
    get:
      summary: Статистика заказов (только admin)
      tags:
        - Stats
      responses:
        '200':
          description: Статистика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
              example:
                totalOrders: 150
                totalRevenue: 45230.50
                pendingOrders: 23
                cancelledOrders: 7
        '403':
          description: Только для администраторов
        '401':
          description: Не авторизован

  /health:
    get:
      summary: Health check
      tags:
        - System
      security: []
      responses:
        '200':
          description: Сервис работает
          content:
            application/json:
              example:
                status: "UP"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT токен из /auth/login"

  schemas:
    CreateOrderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemRequest'

    OrderItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          example: 42
        userId:
          type: integer
          example: 7
        status:
          type: string
          enum: [pending, cancelled]
          example: "pending"
        totalAmount:
          type: number
          format: double
          example: 1999.98
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'

    OrderItemResponse:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        productName:
          type: string
          example: "iPhone 15"
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: double
          example: 999.99

    StatsResponse:
      type: object
      properties:
        totalOrders:
          type: integer
          format: int64
          example: 150
        totalRevenue:
          type: number
          format: double
          example: 45230.50
        pendingOrders:
          type: integer
          format: int64
          example: 23
        cancelledOrders:
          type: integer
          format: int64
          example: 7

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Insufficient stock for product iPhone 15"
openapi: "3.0.0"
info:
  title: Order Service API
  description: Order management
  version: "1.0.0"
servers:
  - url: http://localhost:8083
security:
  - bearerAuth: []
paths:
  /orders:
    post:
      summary: Create order
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              items:
                - productId: 1
                  quantity: 2
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Bad request
        '409':
          description: Insufficient stock
    get:
      summary: Get my orders
      tags:
        - Orders
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
  /orders/{id}:
    delete:
      summary: Cancel order
      tags:
        - Orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cancelled
        '403':
          description: Not your order
        '404':
          description: Not found
  /stats/orders:
    get:
      summary: Get order statistics (admin only)
      tags:
        - Stats
      responses:
        '200':
          description: Statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
        '403':
          description: Admin only
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateOrderRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
    OrderItemRequest:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
    OrderResponse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        status:
          type: string
        totalAmount:
          type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
    OrderItemResponse:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number
    StatsResponse:
      type: object
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        pendingOrders:
          type: integer
        cancelledOrders:
          type: integer

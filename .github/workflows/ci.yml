name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests (auth-service)
        working-directory: auth-service
        run: gradle test --no-daemon
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/testdb
          TEST_DB_USER: test
          TEST_DB_PASSWORD: test

      - name: Run tests (product-service)
        working-directory: product-service
        run: gradle test --no-daemon

      - name: Run tests (order-service)
        working-directory: order-service
        run: gradle test --no-daemon
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/testdb
          TEST_DB_USER: test
          TEST_DB_PASSWORD: test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build all services
        run: |
          cd auth-service && gradle shadowJar --no-daemon
          cd ../product-service && gradle shadowJar --no-daemon
          cd ../order-service && gradle shadowJar --no-daemon
          cd ../notification-worker && gradle shadowJar --no-daemon

      - name: Build Docker images
        run: docker compose build

      - name: Smoke test with docker compose
        run: |
          docker compose up -d
          sleep 30
          curl -f http://localhost:8081/swagger || exit 1
          curl -f http://localhost:8082/swagger || exit 1
          curl -f http://localhost:8083/swagger || exit 1
          docker compose down